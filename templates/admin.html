<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matlock Masters - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-gray-100">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold text-green-800 mb-6">Tournament Entries</h1>
        <div class="overflow-x-auto">
            <table class="min-w-full text-sm">
                <thead>
                    <tr class="bg-green-50">
                        <th class="p-2 text-left">Name</th>
                        <th class="p-2 text-left">Events</th>
                        <th class="p-2 text-left">Lodging</th>
                        <th class="p-2 text-left">Avg Score</th>
                    </tr>
                </thead>
                <tbody>
                    {% for entry in entries %}
                    <tr class="border-b">
                        <td class="p-2">{{ entry.name }}</td>
                        <td class="p-2">
                            {% if entry.proam %}Pro-Am{% endif %}
                            {% if entry.championship %}, Championship{% endif %}
                        </td>
                        <td class="p-2">{{ entry.lodging }}</td>
                        <td class="p-2">{{ entry.average_score }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
