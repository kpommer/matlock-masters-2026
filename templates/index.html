<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matlock Masters 2026 Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0fdf4; }
        .input-field { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; }
        .btn-submit { width: 100%; padding: 15px; background-color: #166534; color: white; border-radius: 8px; font-weight: bold; font-size: 18px; margin-top: 20px; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold text-green-800 text-center mb-2">Matlock Masters 2026</h1>
        <p class="text-center text-gray-600 mb-6">Sept 10-11 • 8 Hazel, Matlock</p>
        
        {% if message %}
        <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">{{ message }}</div>
        {% endif %}

        <form action="/submit" method="POST">
            <div class="mb-4">
                <label class="block text-gray-700 font-bold">Full Name</label>
                <input type="text" name="name" class="input-field" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 font-bold">Email</label>
                <input type="email" name="email" class="input-field" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 font-bold">Phone</label>
                <input type="tel" name="phone" class="input-field" required>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">Attendance</label>
                <label class="flex items-center space-x-2 mb-2">
                    <input type="checkbox" name="friday_attendance" value="1" class="h-5 w-5">
                    <span>Friday (Pro-Am & Meet/Greet)</span>
                </label>
                <label class="flex items-center space-x-2">
                    <input type="checkbox" name="saturday_attendance" value="1" class="h-5 w-5">
                    <span>Saturday (Championship & Dinner)</span>
                </label>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-bold">Lodging at 8 Hazel?</label>
                <select name="lodging" class="input-field">
                    <option value="No">No, I have my own spot</option>
                    <option value="Yes">Yes, reserve a spot</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">Golf Events</label>
                <label class="flex items-center space-x-2 mb-2">
                    <input type="checkbox" name="proam" value="1" class="h-5 w-5">
                    <span>Friday Pro-Am</span>
                </label>
                <label class="flex items-center space-x-2">
                    <input type="checkbox" name="championship" value="1" class="h-5 w-5">
                    <span>Saturday Championship</span>
                </label>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-bold">18-Hole Average Score</label>
                <input type="number" name="average_score" class="input-field" placeholder="e.g. 85" required>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">Meals</label>
                <label class="flex items-center space-x-2 mb-2">
                    <input type="checkbox" name="friday_meal" value="1" class="h-5 w-5">
                    <span>Friday Meet & Greet</span>
                </label>
                <label class="flex items-center space-x-2">
                    <input type="checkbox" name="saturday_meal" value="1" class="h-5 w-5">
                    <span>Saturday Champions Dinner</span>
                </label>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-bold">Dietary Restrictions</label>
                <textarea name="dietary" class="input-field" rows="2"></textarea>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-bold">Shirt Size</label>
                <select name="shirt_size" class="input-field">
                    <option value="M">M</option>
                    <option value="L">L</option>
                    <option value="XL">XL</option>
                    <option value="XXL">XXL</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">Register for Tournament</button>
        </form>
    </div>
</body>
</html>
